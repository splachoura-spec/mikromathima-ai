<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Κεντρικό Ερώτημα</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), repeating-linear-gradient(0deg, transparent, transparent 39px, #E8E8E8 39px, #E8E8E8 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, #E8E8E8 39px, #E8E8E8 40px); min-height: 100vh; padding: 40px 20px; color: #1A1A1A; display: flex; align-items: center; justify-content: center; }
.container { max-width: 760px; margin: 0 auto; text-align: center; }
.pill { display: inline-block; background: #FFE566; border: 1.5px solid #1A1A1A; color: #1A1A1A; font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: 6px 16px; border-radius: 100px; margin-bottom: 32px; text-transform: uppercase; }
.main-card { background: #fff; border: 3px solid #1A1A1A; border-radius: 30px; padding: 60px 40px; box-shadow: 8px 8px 0 #1A1A1A; }
.main-card .tagline { font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #FF9CB8; margin-bottom: 16px; }
.main-card h1 { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 56px; line-height: 1.05; margin-bottom: 24px; }
.main-card h1 .highlight { background: #FF9CB8; padding: 0 12px; }
.main-card .subtitle { font-size: 17px; color: #555; max-width: 480px; margin: 0 auto 30px; line-height: 1.5; }
.btn { background: #FF9CB8; border: 2px solid #1A1A1A; border-radius: 100px; padding: 14px 28px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
.btn:hover { background: #1A1A1A; color: #FF9CB8; transform: translate(-2px, -2px); box-shadow: 4px 4px 0 #FF9CB8; }
.dot { width: 8px; height: 8px; background: #1A1A1A; border-radius: 50%; display: inline-block; }
@media (max-width: 640px) { .main-card { padding: 40px 24px; } .main-card h1 { font-size: 32px; } }
</style>
</head>
<body>
<div class="container">
  <span class="pill">1.2.3 · Κεντρικό Ερώτημα</span>
  <div class="main-card">
    <div class="tagline">Η ερώτηση που οδηγεί όλο το μάθημα</div>
    <h1>πώς ξέρω αν αυτό που μου λέει το AI <span class="highlight">είναι αξιόπιστο;</span></h1>
    <p class="subtitle">Αυτή είναι η ικανότητα που θα αναπτύξεις στα επόμενα 45 λεπτά.</p>
    <a href="1.3.2_pretest.html" class="btn" style="text-decoration:none;"><span class="dot"></span> Πάμε στο Pre-test →</a>
  </div>
</div>
</body>
</html>
